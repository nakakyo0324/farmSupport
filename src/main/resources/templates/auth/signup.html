<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link th:href="@{/css/common.css}" rel="stylesheet" />
</head>
<body class="main-container">
<div th:if="${failureMessage != null}" th:text="${failureMessage}"></div>
<form th:action="@{/signup}" method="post" th:object="${signupForm}">

    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></p>
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></p>
    <p th:if="${#fields.hasErrors('password1')}" th:errors="*{password1}" style="color:red;"></p>
    <p th:if="${#fields.hasErrors('password2')}" th:errors="*{password2}" style="color:red;"></p>
    <label>
        ユーザ名：
        <input type="text" th:field="*{username}">
    </label><br>
    <label>
        メールアドレス：
        <input type="email" th:field="*{email}">
    </label><br>
    <label>
        パスワード：
        <input type="password" th:field="*{password1}">
    </label><br>
    <label>
        パスワード（再入力）：
        <input type="password" th:field="*{password2}">
    </label><br>
    <input type="submit" value="サインインする">
</form>
</body>
</html>
